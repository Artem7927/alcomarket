// Qazaq реально имеет матовое тёмно-серое стекло
const glassMat=new THREE.MeshPhongMaterial({
  color:new THREE.Color(0x8899aa),  // тёмный серо-стальной
  specular:new THREE.Color(0xffffff),
  shininess:150,
  transparent:false,               // непрозрачное!
  side:THREE.DoubleSide,
});
bg.add(new THREE.Mesh(new THREE.LatheGeometry(pts,128),glassMat));

// ЭТИКЕТКА — яркая, непрозрачная
const tex=new THREE.TextureLoader().load(LABEL);
const LAB_BOT=0.10, LAB_TOP=1.40, LAB_H=LAB_TOP-LAB_BOT;
const labelMat=new THREE.MeshPhongMaterial({
  map:tex,
  specular:new THREE.Color(0x334455),
  shininess:25,
  transparent:false,
  depthTest:true,
  depthWrite:true,
});
const lm=new THREE.Mesh(
  new THREE.CylinderGeometry(0.2485,0.2485,LAB_H,128,1,true,0,Math.PI*2),
  labelMat
);
lm.position.y=LAB_BOT+LAB_H/2;
lm.renderOrder=1;
bg.add(lm);

// ПРОБКА
const silv=new THREE.MeshPhongMaterial({color:0xa5b8c8,specular:0xffffff,shininess:350});
const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.057,0.063,0.21,64),silv);
cap.position.y=2.665;bg.add(cap);
const dome=new THREE.Mesh(new THREE.SphereGeometry(0.057,64,32,0,Math.PI*2,0,Math.PI/2),silv);
dome.position.y=2.770;bg.add(dome);
for(let i=0;i<5;i++){
  const r=new THREE.Mesh(new THREE.TorusGeometry(0.062,0.003,8,64),silv);
  r.position.y=2.578+i*0.038;bg.add(r);
}
bg.add(Object.assign(
  new THREE.Mesh(new THREE.CylinderGeometry(0.067,0.058,0.052,64),silv),
  {position:new THREE.Vector3(0,2.538,0)}
));

// ПОЛ
scene.add(Object.assign(
  new THREE.Mesh(new THREE.PlaneGeometry(14,14),
    new THREE.MeshPhongMaterial({color:0x040410,specular:0x1133bb,shininess:200})),
  {rotation:new THREE.Euler(-Math.PI/2,0,0), position:new THREE.Vector3(0,-1.53,0)}
));
const glow=new THREE.Mesh(
  new THREE.PlaneGeometry(1.8,1.8),
  new THREE.MeshBasicMaterial({color:0x1133cc,transparent:true,opacity:0.06})
);
glow.rotation.x=-Math.PI/2;glow.position.y=-1.515;scene.add(glow);

// Частицы
const pG=new THREE.BufferGeometry();
const pA=new Float32Array(60*3);
for(let i=0;i<60;i++){pA[i*3]=(Math.random()-0.5)*8;pA[i*3+1]=(Math.random()-0.5)*8;pA[i*3+2]=(Math.random()-0.5)*4-1;}
pG.setAttribute('position',new THREE.BufferAttribute(pA,3));
scene.add(new THREE.Points(pG,new THREE.PointsMaterial({color:0x3355bb,size:0.018,transparent:true,opacity:0.25})));

// УПРАВЛЕНИЕ
let rX=0,rY=0.5,tX=0,tY=0.5,drag=false,px=0,py=0,auto=true,ltd=0,aT=null,zoom=7.8;
const cv=document.getElementById('c');
cv.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;auto=false;clearTimeout(aT);});
cv.addEventListener('mousemove',e=>{if(!drag)return;tY+=(e.clientX-px)*0.011;tX+=(e.clientY-py)*0.008;tX=Math.max(-0.8,Math.min(0.8,tX));px=e.clientX;py=e.clientY;});
cv.addEventListener('mouseup',()=>{drag=false;aT=setTimeout(()=>{auto=true;},3000);});
cv.addEventListener('wheel',e=>{zoom=Math.max(4,Math.min(12,zoom+e.deltaY*0.005));});
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;auto=false;clearTimeout(aT);}
  else if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){tY+=(e.touches[0].clientX-px)*0.013;tX+=(e.touches[0].clientY-py)*0.010;tX=Math.max(-0.8,Math.min(0.8,tX));px=e.touches[0].clientX;py=e.touches[0].clientY;}
  else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom=Math.max(4,Math.min(12,zoom+(ltd-d)*0.028));ltd=d;}
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchend',()=>{drag=false;aT=setTimeout(()=>{auto=true;},3000);});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(auto) tY+=0.006;
  rX+=(tX-rX)*0.08;rY+=(tY-rY)*0.08;
  bg.rotation.x=rX;bg.rotation.y=rY;
  bg.position.y=-1.35+Math.sin(t*0.75)*0.022;
  camera.position.z+=(zoom-camera.position.z)*0.07;
  glow.material.opacity=0.05+Math.sin(t*1.2)*0.02;
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
